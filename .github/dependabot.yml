version: 2

updates:
  # Application dependencies. Dependabot reads package.json + pnpm-lock.yaml and
  # bumps the exact pinned versions. Minor/patch are grouped into one PR to reduce
  # noise; major bumps arrive as separate PRs so they get individual review.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep the GitHub Actions in .github/workflows current (checkout, setup-node, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
